<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e4d8c" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 script-src  'self';
                 style-src   'self';
                 connect-src 'self'
                             https://bus343-proxy.vrengad.workers.dev
                             https://api.open-meteo.com;
                 img-src     'self';" />
  <title>Bus 343 — My Commute</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <div class="app__brand">
        <span class="app__line-badge">343</span>
        <span class="app__brand-label">Hoofddorp commute</span>
      </div>
      <div class="app__meta">
        <p class="app__weather" id="app-weather">--</p>
        <p class="app__datetime" id="app-datetime">--</p>
      </div>
    </header>

    <!-- Position strip: shows where the bus is on the 3-stop loop -->
    <section id="position-strip" class="position-strip">
      <div class="strip__track">
        <div class="strip__line"></div>
        <div class="strip__stop" style="left: 0%"></div>
        <div class="strip__stop" style="left: 50%"></div>
        <div class="strip__stop" style="left: 100%"></div>
        <div class="strip__bus strip__bus--to-station" id="strip-bus-to-station" style="display: none"></div>
        <div class="strip__bus strip__bus--to-floriande" id="strip-bus-to-floriande" style="display: none"></div>
      </div>
      <div class="strip__labels">
        <span>Floriande</span>
        <span>Calatravabrug</span>
        <span>Station</span>
      </div>
      <p class="strip__status" id="strip-status">Locating bus…</p>
    </section>

    <!-- Two commute cards. app.js will fill these in. -->
    <section class="card" id="card-home-to-station">
      <header class="card__header">
        <h2>Home → Station</h2>
        <p class="card__stop">Floriande Zuidoost</p>
        <span class="card__last-left" id="card-home-to-station-last-left"></span>
      </header>
      <div class="card__body" data-state="loading">
        <p class="card__status">Loading…</p>
      </div>
    </section>

    <section class="card" id="card-station-to-home">
      <header class="card__header">
        <h2>Station → Home</h2>
        <p class="card__stop">Hoofddorp Station, Platform C</p>
        <span class="card__last-left" id="card-station-to-home-last-left"></span>
      </header>
      <div class="card__body" data-state="loading">
        <p class="card__status">Loading…</p>
      </div>
    </section>

    <footer class="app__footer">
      <p id="last-updated">Last updated: —</p>
      <p class="app__credit">Data via ovzoeker.nl</p>
    </footer>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
