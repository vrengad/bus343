<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e4d8c" />
  <title>Bus 343 — My Commute</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1>Bus 343</h1>
      <p class="app__subtitle">Hoofddorp commute</p>
    </header>

    <!-- Two commute cards. app.js will fill these in. -->
    <section class="card" id="card-home-to-station">
      <header class="card__header">
        <h2>Home → Station</h2>
        <p class="card__stop">Floriande Zuidoost</p>
      </header>
      <div class="card__body" data-state="loading">
        <p class="card__status">Loading…</p>
      </div>
    </section>

    <section class="card" id="card-station-to-home">
      <header class="card__header">
        <h2>Station → Home</h2>
        <p class="card__stop">Hoofddorp Station, Platform C</p>
      </header>
      <div class="card__body" data-state="loading">
        <p class="card__status">Loading…</p>
      </div>
    </section>

    <footer class="app__footer">
      <p id="last-updated">Last updated: —</p>
      <p class="app__credit">Data via ovzoeker.nl</p>
    </footer>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
